name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run build
        run: npm run build

      - name: 检查构建产物
        run: |
          if [ ! -d "dist" ]; then
            echo "❌ 构建失败：dist 目录不存在"
            exit 1
          fi
          if [ ! -f "dist/nodes/QingflowOa/QingflowOa.node.js" ]; then
            echo "❌ 构建失败：主要节点文件不存在"
            exit 1
          fi
          if [ ! -f "dist/credentials/QingflowOaApi.credentials.js" ]; then
            echo "❌ 构建失败：凭据文件不存在"
            exit 1
          fi
          echo "✅ 构建成功，所有必要文件都已生成"
